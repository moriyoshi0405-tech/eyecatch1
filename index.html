<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #f5f5f5;
  font-family: 'Zen Maru Gothic', sans-serif;
}

.banner {
  width: 100%;   /* ← ここを変更 */
  max-width: 1100px; /* ← 追加（広がりすぎ防止） */
  height: 180px;
  border-radius: 20px;
  background: linear-gradient(135deg, #ffffff, #f1f3f5);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  display: flex;
  align-items: center;
  padding: 0 50px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s ease;
}

/* ホバーでカードも少し浮く */
.banner:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.12);
}

.banner::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,150,150,0.15), transparent 60%);
  animation: bgMove 12s linear infinite;
}

@keyframes bgMove {
  0% { transform: translate(-10%, -10%) rotate(0deg); }
  100% { transform: translate(-20%, -20%) rotate(360deg); }
}

.text-area {
  z-index: 1;
}

.small {
  font-size: 16px;
  color: #777;
  margin-bottom: 5px;
  opacity: 0;
  animation: fadeUp 0.8s ease forwards;
}

.main {
  font-size: 34px;
  font-weight: 700;
  color: #333;
  display: flex;
  align-items: center;
  gap: 10px;
}

.highlight {
  font-size: 42px;
  color: #ff6b6b;
  transform: scale(0);
  animation: pop 0.6s ease 0.4s forwards;
}

.sub {
  font-size: 14px;
  color: #888;
  margin-top: 5px;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.6s forwards;
}

/* 画像アイコン */
.icon {
  position: absolute;
  right: 40px;
  width: 120px;
  opacity: 0.9;
  animation: float 3s ease-in-out infinite;
  transition: transform 0.3s ease;
}

/* 🔥 ホバーで動く */
.banner:hover .icon {
  transform: scale(1.08) rotate(-4deg);
}

/* アニメーション */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(15px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes pop {
  0% { transform: scale(0); }
  70% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

</style>
</head>

<body>

<div class="banner">

  <div class="text-area">
    <div class="small">好きな本がサクッと見つかる</div>

    <div class="main">
      作品
      <span class="highlight">30秒</span>
      紹介
    </div>

    <div class="sub">気軽に読める、本との出会い</div>
  </div>

  <img src="icon.png" class="icon">

</div>

</body>
</html>
