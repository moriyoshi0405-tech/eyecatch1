<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: transparent; /* Notionに馴染ませる */
  font-family: 'Zen Maru Gothic', sans-serif;
}

/* バナー */
.banner {
  width: 100%;
  height: 160px;
  border-radius: 16px;
  background: linear-gradient(135deg, #ffffff, #f1f3f5);
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  padding: 0 24px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s ease;
}

/* PCのみホバー */
@media (hover: hover) {
  .banner:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.1);
  }
}

/* 背景アニメ */
.banner::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,150,150,0.12), transparent 60%);
  animation: bgMove 12s linear infinite;
}

@keyframes bgMove {
  0% { transform: translate(-10%, -10%) rotate(0deg); }
  100% { transform: translate(-20%, -20%) rotate(360deg); }
}

/* テキスト */
.text-area {
  z-index: 1;
}

.small {
  font-size: 14px;
  color: #777;
  margin-bottom: 4px;
  opacity: 0;
  animation: fadeUp 0.8s ease forwards;
}

.main {
  font-size: 28px;
  font-weight: 700;
  color: #333;
  display: flex;
  align-items: center;
  gap: 8px;
}

.highlight {
  font-size: 34px;
  color: #ff6b6b;
  transform: scale(0);
  animation: pop 0.6s ease 0.4s forwards;
}

.sub {
  font-size: 12px;
  color: #888;
  margin-top: 4px;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.6s forwards;
}

/* アイコン */
.icon {
  position: absolute;
  right: 20px;
  width: 90px;
  opacity: 0.85;
  animation: float 3s ease-in-out infinite;
}

/* PCのみホバー効果 */
@media (hover: hover) {
  .banner:hover .icon {
    transform: scale(1.05) rotate(-3deg);
  }
}

/* アニメーション */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes pop {
  0% { transform: scale(0); }
  70% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* ===== スマホ対応 ===== */
@media (max-width: 600px) {

  .banner {
    height: 120px;
    padding: 0 16px;
  }

  .small {
    font-size: 12px;
  }

  .main {
    font-size: 20px;
  }

  .highlight {
    font-size: 24px;
  }

  .sub {
    font-size: 11px;
  }

  .icon {
    width: 60px;
    right: 12px;
  }
}

</style>
</head>

<body>

<div class="banner" onclick="window.open('#','_blank')">

  <div class="text-area">
    <div class="small">好きな本がサクッと見つかる</div>

    <div class="main">
      作品
      <span class="highlight">30秒</span>
      紹介
    </div>

    <div class="sub">気軽に読める、本との出会い</div>
  </div>

  <img src="icon.png" class="icon">

</div>

</body>
</html>
